# Стенд ПЗ10: PostgreSQL + Redis + 3 реплики tasks + NGINX (балансировка на :8080)
# Запуск только из этой папки: не поднимайте одновременно с deploy/docker-compose.yml на те же порты хоста.
services:
  db:
    image: postgres:15-alpine
    container_name: lb_postgres
    environment:
      POSTGRES_USER: tasks
      POSTGRES_PASSWORD: tasks
      POSTGRES_DB: tasks
    volumes:
      - lb_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7.4-alpine
    container_name: lb_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  tasks_1:
    build:
      context: ../..
      dockerfile: services/tasks/Dockerfile
    container_name: lb_tasks_1
    environment:
      INSTANCE_ID: "tasks-1"
      TASKS_PORT: "8082"
      AUTH_MODE: "http"
      AUTH_BASE_URL: "http://host.docker.internal:8081"
      DATABASE_URL: "postgres://tasks:tasks@db:5432/tasks?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      CACHE_TTL: "120s"
      CACHE_TTL_JITTER: "30s"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  tasks_2:
    build:
      context: ../..
      dockerfile: services/tasks/Dockerfile
    container_name: lb_tasks_2
    environment:
      INSTANCE_ID: "tasks-2"
      TASKS_PORT: "8082"
      AUTH_MODE: "http"
      AUTH_BASE_URL: "http://host.docker.internal:8081"
      DATABASE_URL: "postgres://tasks:tasks@db:5432/tasks?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      CACHE_TTL: "120s"
      CACHE_TTL_JITTER: "30s"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  tasks_3:
    build:
      context: ../..
      dockerfile: services/tasks/Dockerfile
    container_name: lb_tasks_3
    environment:
      INSTANCE_ID: "tasks-3"
      TASKS_PORT: "8082"
      AUTH_MODE: "http"
      AUTH_BASE_URL: "http://host.docker.internal:8081"
      DATABASE_URL: "postgres://tasks:tasks@db:5432/tasks?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      CACHE_TTL: "120s"
      CACHE_TTL_JITTER: "30s"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    container_name: lb_nginx
    ports:
      - "8080:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - tasks_1
      - tasks_2
      - tasks_3

volumes:
  lb_pgdata:
